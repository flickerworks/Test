name: Automated API tests using Postman CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: ci

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          echo "Starting server..."
          nohup node server.js > server.log 2>&1 &
          sleep 5

      - name: Print server log
        run: |
          echo "===== SERVER LOG ====="
          cat server.log || true

      - name: Verify server is running (HARD FAIL)
        run: |
          echo "Checking port 3000..."
          if ! nc -z 127.0.0.1 3000; then
            echo "❌ Server NOT running"
            echo "===== FINAL SERVER LOG ====="
            cat server.log || true
            exit 1
          fi
          echo "✅ Server is running"

      - name: Test API manually
        run: |
          curl -i http://localhost:3000 || true

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run API tests
        run: |
          postman collection run "2238505-8bdef551-b2af-4b0f-8cff-5fa8ee50587b" \
          -e "2238505-97e7de18-27ac-426f-899a-b2af4d6a0124"
